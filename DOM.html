<!-- //document object model DOM -->
<!DOCTYPE html>
<html>
    <head>
        <title>DOM</title>
    </head>
    <body>
        <div id="main">
            <h1 id="head">Hello guys</h1>
            <button id="changeText">Change text</button>
            <input type="text" id="input">
            <h2 class="head2">Lorem ipsum dolor sit.</h2>
            <h2 class="head2">Lorem ipsum dolor sit.</h2>
            <h2 class="head2">Lorem ipsum dolor sit.</h2>
            <p >Lorem ipsum dolor sit amet consectetur adipisicing elit. Nihil, ullam!</p>

            <button id="addButton" >ADD </button>
        </div>
        <div id="fruitList">
            <input type="text" id="input" placeholder="Enter fruits">
            <button id="addFruits">AddFruits</button>
            <button id="showButton">Show data</button>
        </div>
        <ol id="list">

        </ol>
        <div ID="showData"></div>

        




        <script>
            //id selector
              let head=document.getElementById("head")
              let changeTextbutton=document.getElementById("changeText")
              let addButton=document.getElementById("addButton")
              let input=document.getElementById("input")
                addButton.addEventListener("click",function()
            {
                input.style.backgroundColor="black"
            })
              changeTextbutton.addEventListener("click",function()
              {
                head.innerText="It's changed"
                head.style.color="red"
                
              })

              //head selector
              let head2=document.getElementsByClassName("head2")
             // head2.style.color="red"
              head2[2].style.color="blue"

              //tag selector
              let para=document.getElementsByTagName("p")
              para[0].style.color="yellow"

              //create element
              let newPara=document.createElement("p")
              newPara.innerText="this is a new paragraph"
              let main=document.getElementById("main")
              main.appendChild(newPara)

              //console.log(newPara)
             

        </script>
    </body>
    

</html>
